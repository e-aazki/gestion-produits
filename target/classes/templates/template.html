<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Gestion des produits</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" th:href="@{/index}">
            <i class="bi bi-box-seam"></i> Gestion des produits
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-light" sec:authorize="isAuthenticated()">
                Connecte : <b sec:authentication="name"></b>
            </span>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button class="btn btn-outline-light btn-sm" type="submit">Deconnexion</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4" layout:fragment="content">
        <!-- le contenu des pages filles est injecte ici -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
