# ===== Profil actif =====
# "h2" par defaut (base en memoire, pratique pour tester tout de suite)
# passer a "mysql" pour utiliser une vraie base MySQL (voir application-mysql.properties)
spring.profiles.active=h2

# ===== Thymeleaf =====
spring.thymeleaf.cache=false

# ===== JPA / Hibernate (commun) =====
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
