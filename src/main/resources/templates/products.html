<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{template}">
<head>
    <title>Liste des produits</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Liste des produits</h2>
        <a class="btn btn-success" th:href="@{/formProduct}" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle"></i> Ajouter un produit
        </a>
    </div>

    <!-- Barre de recherche -->
    <form method="get" th:action="@{/index}" class="row g-2 mb-3">
        <div class="col-auto">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Rechercher un produit...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-search"></i> Rechercher
            </button>
        </div>
    </form>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Quantite</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listProducts}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price} + ' DH'"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/editProduct(id=${product.id})}">
                    <i class="bi bi-pencil-square"></i>
                </a>
                <a class="btn btn-sm btn-outline-danger"
                   th:href="@{/delete(id=${product.id}, page=${currentPage}, keyword=${keyword})}"
                   onclick="return confirm('Confirmer la suppression de ce produit ?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${pages.length > 1}">
        <ul class="pagination">
            <li class="page-item" th:each="page, status : ${pages}"
                th:classappend="${status.index} == ${currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/index(page=${status.index}, keyword=${keyword})}"
                   th:text="${status.index} + 1"></a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
