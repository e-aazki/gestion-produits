<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-center" style="height:100vh">
    <div class="card shadow p-4" style="width: 380px">
        <h3 class="text-center mb-3">
            <i class="bi bi-box-seam"></i> Gestion des produits
        </h3>
        <form th:action="@{/login}" method="post">
            <div class="alert alert-danger" th:if="${param.error}">
                Nom d'utilisateur ou mot de passe incorrect.
            </div>
            <div class="alert alert-success" th:if="${param.logout}">
                Vous avez ete deconnecte avec succes.
            </div>
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
        <p class="text-muted mt-3 mb-0" style="font-size: 0.85rem">
            Comptes de demo : <b>admin/1234</b> (role ADMIN) ou <b>user/1234</b> (role USER)
        </p>
    </div>
</div>
</body>
</html>
